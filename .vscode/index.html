<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marks Analyzer</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        input {
            width: 80%;
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Marks Analyzer</h2>
    
    <input type="number" id="marksCount" placeholder="Number of subjects"><br>
    <button onclick="getInputs()">Enter Marks</button>

    <div id="marksInputs"></div>

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script>
function getInputs() {
    let count = document.getElementById("marksCount").value;
    let container = document.getElementById("marksInputs");
    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
        container.innerHTML += `<input type="number" class="mark" placeholder="Subject ${i+1}"><br>`;
    }
}

function calculate() {
    let marks = document.getElementsByClassName("mark");
    let total = 0;

    // LOOP
    for (let i = 0; i < marks.length; i++) {
        total += Number(marks[i].value);
    }

    let avg = total / marks.length;
    let grade = "";

    // CONDITIONAL STATEMENTS
    if (avg >= 90) grade = "A+";
    else if (avg >= 75) grade = "A";
    else if (avg >= 60) grade = "B";
    else if (avg >= 50) grade = "C";
    else grade = "Fail";

    document.getElementById("result").innerHTML =
        `Total: ${total} <br> Average: ${avg.toFixed(2)} <br> Grade: ${grade}`;
}
</script>

</body>
</html>
